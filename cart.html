<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Корзина - СанТехПро</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .cart-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      .cart-header {
        margin-bottom: 30px;
      }
      .empty-cart {
        text-align: center;
        padding: 60px 20px;
        background: white;
        border-radius: 24px;
      }
      .empty-cart i {
        font-size: 4rem;
        color: #ccc;
        margin-bottom: 20px;
      }
      .empty-cart p {
        font-size: 1.2rem;
        color: #666;
        margin-bottom: 20px;
      }
      .cart-grid {
        display: grid;
        grid-template-columns: 1fr 380px;
        gap: 30px;
      }
      .cart-items {
        background: white;
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      }
      .cart-header-row {
        display: grid;
        grid-template-columns: 3fr 1fr 1fr 0.5fr;
        padding: 15px 0;
        border-bottom: 2px solid #f0f0f0;
        font-weight: 600;
        color: #666;
      }
      .cart-item {
        display: grid;
        grid-template-columns: 3fr 1fr 1fr 0.5fr;
        align-items: center;
        padding: 20px 0;
        border-bottom: 1px solid #f0f0f0;
      }
      .product-info {
        display: flex;
        gap: 15px;
        align-items: center;
      }
      .product-image {
        width: 70px;
        height: 70px;
        background: #f1f5f9;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
      }
      .product-details h4 {
        margin-bottom: 5px;
      }
      .product-details p {
        color: #94a3b8;
        font-size: 0.85rem;
      }
      .item-price {
        font-weight: 600;
        color: #e67e22;
      }
      .quantity-controls {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .quantity-btn {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 1px solid #ddd;
        background: white;
        cursor: pointer;
        font-size: 1.1rem;
      }
      .quantity-btn:hover {
        background: #f0f0f0;
      }
      .quantity-value {
        min-width: 40px;
        text-align: center;
        font-weight: 600;
      }
      .remove-btn {
        color: #ef4444;
        cursor: pointer;
        text-align: center;
        font-size: 1.2rem;
      }
      .remove-btn:hover {
        color: #dc2626;
      }
      .cart-summary {
        background: white;
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        position: sticky;
        top: 120px;
        height: fit-content;
      }
      .summary-title {
        margin-bottom: 20px;
      }
      .summary-row {
        display: flex;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid #f0f0f0;
      }
      .summary-total {
        display: flex;
        justify-content: space-between;
        font-size: 1.3rem;
        font-weight: 700;
        color: #e67e22;
        margin-top: 15px;
        padding-top: 15px;
        border-top: 2px solid #f0f0f0;
      }
      .checkout-btn {
        width: 100%;
        background: #e67e22;
        color: white;
        border: none;
        padding: 16px;
        border-radius: 40px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        margin-top: 20px;
      }
      .checkout-btn:hover {
        background: #d35400;
      }
      .clear-cart-btn {
        width: 100%;
        background: transparent;
        color: #ef4444;
        border: 1px solid #ef4444;
        padding: 12px;
        border-radius: 40px;
        cursor: pointer;
        margin-top: 10px;
      }
      .clear-cart-btn:hover {
        background: #fee2e2;
      }
      .loading {
        text-align: center;
        padding: 60px 20px;
      }
      .loading i {
        font-size: 3rem;
        color: #e67e22;
        margin-bottom: 20px;
      }
      @media (max-width: 768px) {
        .cart-grid {
          grid-template-columns: 1fr;
        }
        .cart-header-row {
          display: none;
        }
        .cart-item {
          grid-template-columns: 1fr;
          gap: 15px;
        }
        .product-info {
          flex-direction: column;
          text-align: center;
        }
        .quantity-controls {
          justify-content: center;
        }
        .remove-btn {
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="header-flex">
          <div class="logo">СанТех<span>Про</span></div>
          <div class="search-wrapper">
            <input
              type="text"
              id="searchInputGlobal"
              placeholder="Поиск товаров..."
            />
            <i class="fas fa-search"></i>
          </div>
          <button class="vision-btn" id="visionToggle">
            <i class="fas fa-eye"></i> Версия для слабовидящих
          </button>
          <div class="cart-icon" id="cartIcon">
            <i class="fas fa-shopping-cart"></i>
            <span id="cartCount">0</span>
          </div>
        </div>
        <div class="nav-links">
          <a href="index.html">Главная</a>
          <a href="about.html">О нас</a>
          <a href="catalog.html">Товары</a>
          <a href="cart.html">Корзина</a>
          <a href="contacts.html">Контакты</a>
        </div>
      </div>
    </header>

    <main>
      <div class="container">
        <div class="section-title">🛒 Моя корзина</div>
        <div id="cartContent">
          <div class="loading">
            <i class="fas fa-spinner fa-pulse"></i>
            <p>Загрузка корзины...</p>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="footer-grid">
          <div>
            <h3>СанТехПро</h3>
            <p>Сантехника для дома</p>
          </div>
          <div>
            <h4>Контакты</h4>
            <p>+7 (495) 123-45-67</p>
          </div>
          <div class="social">
            <h4>Соцсети</h4>
            <i class="fab fa-vk"></i><i class="fab fa-telegram"></i>
          </div>
        </div>
        <hr />
        <p style="text-align: center">© СанТехПро 2025</p>
      </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
  </body>
</html>
