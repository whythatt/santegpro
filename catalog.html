<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Каталог - СанТехПро</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .filter-bar {
        display: flex;
        gap: 15px;
        margin-bottom: 30px;
        flex-wrap: wrap;
      }
      .filter-bar select,
      .filter-bar button {
        padding: 10px 20px;
        border-radius: 40px;
        border: 1px solid #ddd;
        background: white;
        cursor: pointer;
      }
      .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
        gap: 30px;
        margin-bottom: 40px;
      }
      .product-item {
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        transition: transform 0.2s;
        cursor: pointer;
      }
      .product-item:hover {
        transform: translateY(-5px);
      }
      .product-img {
        height: 200px;
        background: #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3.5rem;
      }
      .product-info {
        padding: 18px;
      }
      .product-title {
        font-weight: 700;
        margin-bottom: 8px;
      }
      .price {
        color: #e67e22;
        font-weight: 700;
        font-size: 1.3rem;
        margin: 8px 0;
      }
      .btn-small {
        background: #0f3b5c;
        border: none;
        color: white;
        padding: 8px 16px;
        border-radius: 40px;
        margin-top: 8px;
        margin-right: 8px;
        cursor: pointer;
      }
      .btn-small:hover {
        background: #e67e22;
      }
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }
      .modal-content {
        background: white;
        max-width: 500px;
        width: 90%;
        padding: 32px;
        border-radius: 32px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="header-flex">
          <div class="logo">СанТех<span>Про</span></div>
          <div class="search-wrapper">
            <input
              type="text"
              id="searchInputGlobal"
              placeholder="Поиск товаров..."
            />
            <i class="fas fa-search"></i>
          </div>
          <button class="vision-btn" id="visionToggle">
            <i class="fas fa-eye"></i> Версия для слабовидящих
          </button>
          <div class="cart-icon" id="cartIcon">
            <i class="fas fa-shopping-cart"></i>
            <span id="cartCount">0</span>
          </div>
        </div>
        <div class="nav-links">
          <a href="index.html">Главная</a>
          <a href="about.html">О нас</a>
          <a href="catalog.html">Товары</a>
          <a href="cart.html">Корзина</a>
          <a href="contacts.html">Контакты</a>
        </div>
      </div>
    </header>

    <main>
      <div class="container">
        <div class="section-title">Каталог товаров</div>

        <div class="filter-bar">
          <select id="categoryFilter">
            <option value="all">Все категории</option>
            <option value="Смеситель">Смесители</option>
            <option value="Душевая">Душевые системы</option>
            <option value="Унитаз">Унитазы</option>
            <option value="Раковина">Раковины</option>
            <option value="Ванна">Ванны</option>
            <option value="Аксессуары">Аксессуары</option>
          </select>
          <select id="sortSelect">
            <option value="default">По умолчанию</option>
            <option value="price-asc">Цена: по возрастанию</option>
            <option value="price-desc">Цена: по убыванию</option>
          </select>
          <button id="resetFilters">Сбросить фильтры</button>
        </div>

        <div class="products-grid" id="productsGrid">
          <div style="text-align: center; padding: 50px">
            ⏳ Загрузка товаров...
          </div>
        </div>
        <div
          id="noResults"
          style="display: none; text-align: center; padding: 50px"
        >
          <i class="fas fa-search" style="font-size: 3rem; color: #ccc"></i>
          <p>Товары не найдены</p>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="footer-grid">
          <div>
            <h3>СанТехПро</h3>
            <p>Сантехника для дома</p>
          </div>
          <div>
            <h4>Контакты</h4>
            <p>+7 (495) 123-45-67</p>
          </div>
          <div class="social">
            <h4>Соцсети</h4>
            <i class="fab fa-vk"></i><i class="fab fa-telegram"></i
            ><i class="fab fa-whatsapp"></i>
          </div>
        </div>
        <hr />
        <p style="text-align: center">© СанТехПро 2025</p>
      </div>
    </footer>

    <!-- ВАЖНО: порядок подключения -->
    <script src="js/main.js"></script>
    <script src="js/products.js"></script>
  </body>
</html>
